<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    html,body{margin:0;padding:0;height:100%;background:#000;overflow:hidden;}
    *{box-sizing:border-box;}
    ::selection{background:rgba(255,255,255,.15);}
  </style>
</helmet>

<div style="position:fixed;inset:0;background:{{ bg }};overflow:hidden;font-family:'IBM Plex Mono',monospace;-webkit-font-smoothing:antialiased;">

  <!-- ART REGION (art is contained, centred, never cropped) -->
  <div style="position:absolute;top:0;left:0;right:0;bottom:{{ artBottom }};">{{ artLayers }}</div>

  <!-- CAPTION BAND (lives in the matte, never overlaps the art) -->
  <sc-if value="{{ showCaption }}" hint-placeholder-val="{{ true }}">
    <div style="position:absolute;left:0;right:0;bottom:0;height:112px;display:flex;align-items:center;justify-content:space-between;gap:36px;padding:0 52px;">
      <div style="display:flex;flex-direction:column;gap:9px;min-width:0;">
        <div style="font-family:'Cormorant Garamond',serif;font-weight:600;font-size:31px;line-height:1.02;color:#f1efe8;letter-spacing:.005em;text-wrap:pretty;">{{ piece.title }}</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(241,239,232,.48);">{{ piece.metaLine }}</div>
      </div>
      <div style="display:flex;align-items:center;gap:16px;flex:none;">
        <div style="width:74px;height:74px;border-radius:9px;background:#f7f6f2;padding:7px;flex:none;box-shadow:0 4px 18px rgba(0,0,0,.4);">
          <img src="{{ qrSrc }}" alt="QR code linking to museum or reference page" style="width:100%;height:100%;display:block;" />
        </div>
      </div>
    </div>
  </sc-if>

  <!-- COLLECTION INTRO (fades in briefly when a new collection begins) -->
  <div style="position:absolute;inset:0;z-index:25;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:20px;padding:0 48px;background:rgba(8,8,9,.74);opacity:{{ introOpacity }};transition:opacity .85s ease;pointer-events:none;">
    <div style="font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.42em;text-transform:uppercase;color:rgba(241,239,232,.55);">{{ collection.era }}</div>
    <div style="font-family:'Cormorant Garamond',serif;font-weight:500;font-size:78px;line-height:.98;color:#f4f2ec;letter-spacing:.01em;">{{ collection.title }}</div>
    <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:400;font-size:24px;color:rgba(241,239,232,.74);max-width:660px;line-height:1.42;text-wrap:pretty;">{{ collection.blurb }}</div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:rgba(241,239,232,.38);margin-top:8px;">{{ collection.countLabel }}</div>
  </div>

  <!-- HANDLE HINT (peeks at the bottom edge) -->
  <div style="position:absolute;left:50%;bottom:9px;transform:translateX(-50%);width:42px;height:4px;border-radius:2px;background:rgba(255,255,255,.16);z-index:20;"></div>

  <!-- CONTROL BAR (slides away behind the bottom edge) -->
  <div style="position:absolute;left:50%;bottom:22px;transform:translate(-50%,{{ menuY }});transition:transform .5s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:4px;padding:8px 12px;border-radius:17px;background:rgba(18,18,20,.82);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:1px solid rgba(255,255,255,.09);box-shadow:0 18px 60px rgba(0,0,0,.55);z-index:30;font-family:'IBM Plex Mono',monospace;color:#e9e7e0;">

    <div onClick="{{ onPrev }}" style="width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s;" style-hover="background:rgba(255,255,255,.1);">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><path d="M11 2.5 L4 8 L11 13.5 Z"></path></svg>
    </div>
    <div onClick="{{ onTogglePlay }}" style="width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,.07);transition:background .2s;" style-hover="background:rgba(255,255,255,.16);">{{ playIcon }}</div>
    <div onClick="{{ onNext }}" style="width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s;" style-hover="background:rgba(255,255,255,.1);">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><path d="M5 2.5 L12 8 L5 13.5 Z"></path></svg>
    </div>

    <div style="width:1px;height:26px;background:rgba(255,255,255,.12);margin:0 8px;"></div>

    <div onClick="{{ onPrevColl }}" style="width:30px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(233,231,224,.6);transition:color .2s;" style-hover="color:#fff;">
      <svg width="9" height="13" viewBox="0 0 9 13" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M7 1 L2 6.5 L7 12"></path></svg>
    </div>
    <div style="min-width:182px;text-align:center;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#cfcdc4;">{{ collectionTitle }}</div>
    <div onClick="{{ onNextColl }}" style="width:30px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(233,231,224,.6);transition:color .2s;" style-hover="color:#fff;">
      <svg width="9" height="13" viewBox="0 0 9 13" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 1 L7 6.5 L2 12"></path></svg>
    </div>

    <div style="width:1px;height:26px;background:rgba(255,255,255,.12);margin:0 8px;"></div>

    <div style="font-size:11px;letter-spacing:.12em;color:rgba(233,231,224,.55);padding:0 6px;white-space:nowrap;">{{ counterLabel }}</div>

    <div onClick="{{ onFullscreen }}" style="width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(233,231,224,.7);transition:background .2s;" style-hover="background:rgba(255,255,255,.1);">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 6 V2 H6 M10 2 H14 V6 M14 10 V14 H10 M6 14 H2 V10"></path></svg>
    </div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: &quot;100%&quot;, &quot;height&quot;: &quot;100%&quot;},
  &quot;minutesPerPiece&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 5, &quot;min&quot;: 1, &quot;max&quot;: 30, &quot;tsType&quot;: &quot;number&quot;},
  &quot;showCaption&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;},
  &quot;showCollectionIntro&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;},
  &quot;background&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;#0a0a0a&quot;, &quot;options&quot;: [&quot;#0a0a0a&quot;, &quot;#000000&quot;, &quot;#0c0b0a&quot;], &quot;tsType&quot;: &quot;string&quot;}
}">
const COLLECTIONS = [
  {
    id:'dutch', title:'Dutch Golden Age', era:'1600 \u2014 1700',
    blurb:'Light, stillness, and the quiet drama of everyday life in the Low Countries.',
    accent:'#6b4f2a', accent2:'#241a0f',
    pieces:[
      {title:'Girl with a Pearl Earring', artist:'Johannes Vermeer', date:'c. 1665', medium:'Oil on canvas', source:'Mauritshuis',
       image:'https://commons.wikimedia.org/wiki/Special:FilePath/1665_Girl_with_a_Pearl_Earring.jpg',
       link:'https://www.mauritshuis.nl/en/our-collection/artworks/670-girl-with-a-pearl-earring/'},
      {title:'The Milkmaid', artist:'Johannes Vermeer', date:'c. 1658', medium:'Oil on canvas', source:'Rijksmuseum',
       image:'https://commons.wikimedia.org/wiki/Special:FilePath/Johannes_Vermeer_-_Het_melkmeisje_-_Google_Art_Project.jpg',
       link:'https://www.rijksmuseum.nl/en/collection/SK-A-2344'},
      {title:'The Night Watch', artist:'Rembrandt van Rijn', date:'1642', medium:'Oil on canvas', source:'Rijksmuseum',
       image:'https://commons.wikimedia.org/wiki/Special:FilePath/The_Night_Watch_-_HD.jpg',
       link:'https://www.rijksmuseum.nl/en/collection/SK-C-5'}
    ]
  },
  {
    id:'ukiyoe', title:'Japanese Ukiyo-e', era:'Edo Period \u00b7 1603 \u2014 1868',
    blurb:'Woodblock prints of the floating world \u2014 waves, weather, and fleeting beauty.',
    accent:'#2b4a63', accent2:'#0f1c28',
    pieces:[
      {title:'The Great Wave off Kanagawa', artist:'Katsushika Hokusai', date:'c. 1831', medium:'Woodblock print', source:'The Met',
       image:'https://commons.wikimedia.org/wiki/Special:FilePath/Tsunami_by_hokusai_19th_century.jpg',
       link:'https://www.metmuseum.org/art/collection/search/45434'},
      {title:'Fine Wind, Clear Morning', artist:'Katsushika Hokusai', date:'c. 1830', medium:'Woodblock print', source:'The Met',
       image:'https://commons.wikimedia.org/wiki/Special:FilePath/Red_Fuji_southern_wind_clear_morning.jpg',
       link:'https://www.metmuseum.org/art/collection/search/56074'},
      {title:'Sudden Shower over Shin-\u014Chashi Bridge', artist:'Utagawa Hiroshige', date:'1857', medium:'Woodblock print', source:'The Met',
       image:'https://commons.wikimedia.org/wiki/Special:FilePath/Hiroshige_Atake_sudden_shower.jpg',
       link:'https://www.metmuseum.org/art/collection/search/37362'}
    ]
  },
  {
    id:'postimp', title:'Post-Impressionism', era:'1880 \u2014 1905',
    blurb:'Colour set free \u2014 the night sky, the lamplit caf\u00e9, paint laid on like emotion.',
    accent:'#243a64', accent2:'#0e1730',
    pieces:[
      {title:'The Starry Night', artist:'Vincent van Gogh', date:'1889', medium:'Oil on canvas', source:'MoMA',
       image:'https://commons.wikimedia.org/wiki/Special:FilePath/Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg',
       link:'https://www.moma.org/collection/works/79802'},
      {title:'Caf\u00e9 Terrace at Night', artist:'Vincent van Gogh', date:'1888', medium:'Oil on canvas', source:'Kr\u00f6ller-M\u00fcller',
       image:'https://commons.wikimedia.org/wiki/Special:FilePath/Vincent_Willem_van_Gogh_-_Cafe_Terrace_at_Night_(Yorck).jpg',
       link:'https://krollermuller.nl/en/vincent-van-gogh-terrace-of-a-cafe-at-night-place-du-forum'},
      {title:'Impression, Sunrise', artist:'Claude Monet', date:'1872', medium:'Oil on canvas', source:'Mus\u00e9e Marmottan',
       image:'https://commons.wikimedia.org/wiki/Special:FilePath/Monet_-_Impression,_Sunrise.jpg',
       link:'https://www.marmottan.fr/en/collections/impression-sunrise/'}
    ]
  },
  {
    id:'egypt', title:'Ancient Egypt', era:'New Kingdom \u00b7 c. 1550 \u2014 1070 BC',
    blurb:'Stone and gold made to outlast empires \u2014 the sculptured faces of the divine.',
    accent:'#7a5a22', accent2:'#2a1e0c',
    pieces:[
      {title:'Bust of Nefertiti', artist:'Attributed to Thutmose', date:'c. 1345 BC', medium:'Painted limestone', source:'Neues Museum',
       image:'https://commons.wikimedia.org/wiki/Special:FilePath/Nofretete_Neues_Museum.jpg',
       link:'https://www.smb.museum/en/museums-institutions/neues-museum/collection-research/'},
      {title:'Mask of Tutankhamun', artist:'Unknown', date:'c. 1323 BC', medium:'Gold and inlay', source:'Egyptian Museum, Cairo',
       image:'https://commons.wikimedia.org/wiki/Special:FilePath/CairoEgMuseumTaaMaskMostlyPhotographed.jpg',
       link:'https://en.wikipedia.org/wiki/Mask_of_Tutankhamun'},
      {title:'The Seated Scribe', artist:'Unknown', date:'c. 2600 \u2014 2350 BC', medium:'Painted limestone', source:'Louvre',
       image:'https://commons.wikimedia.org/wiki/Special:FilePath/Egyptian_-_Seated_Scribe_-_Walters_22231.jpg',
       link:'https://collections.louvre.fr/en/ark:/53355/cl010005973'}
    ]
  },
  {
    id:'modern', title:'Turn of the Century', era:'1890 \u2014 1930',
    blurb:'Symbolism, gold leaf, and pure geometry \u2014 modern art finding its first voices.',
    accent:'#6a2a3a', accent2:'#251017',
    pieces:[
      {title:'The Kiss', artist:'Gustav Klimt', date:'1908', medium:'Oil and gold leaf', source:'Belvedere',
       image:'https://commons.wikimedia.org/wiki/Special:FilePath/The_Kiss_-_Gustav_Klimt_-_Google_Cultural_Institute.jpg',
       link:'https://www.belvedere.at/en/kiss'},
      {title:'Composition II in Red, Blue, and Yellow', artist:'Piet Mondrian', date:'1930', medium:'Oil on canvas', source:'Kunsthaus Z\u00fcrich',
       image:'https://commons.wikimedia.org/wiki/Special:FilePath/Piet_Mondriaan,_1930_-_Mondrian_Composition_II_in_Red,_Blue,_and_Yellow.jpg',
       link:'https://en.wikipedia.org/wiki/Composition_II_in_Red,_Blue,_and_Yellow'},
      {title:'The Scream', artist:'Edvard Munch', date:'1893', medium:'Oil, tempera and pastel', source:'National Museum, Norway',
       image:'https://commons.wikimedia.org/wiki/Special:FilePath/Edvard_Munch,_1893,_The_Scream,_oil,_tempera_and_pastel_on_cardboard,_91_x_73_cm,_National_Gallery_of_Norway.jpg',
       link:'https://www.nasjonalmuseet.no/en/collection/object/NG.M.00939'}
    ]
  }
];

const FLAT = [];
COLLECTIONS.forEach((c, ci) => {
  c.pieces.forEach((p, pi) => {
    FLAT.push(Object.assign({}, p, {
      collIndex: ci, pieceIndex: pi, isCollectionStart: pi === 0,
      collTitle: c.title, era: c.era, blurb: c.blurb,
      accent: c.accent, accent2: c.accent2, pieceCount: c.pieces.length
    }));
  });
});

class Component extends DCLogic {
  state = { i:0, prevI:null, fade:true, playing:true, intro:true, menuOpen:false, failed:{} };

  componentDidMount(){
    this._elapsed = 0;
    this._lastActivity = Date.now();
    this._tick = setInterval(() => this.tick(), 250);
    this._introT = setTimeout(() => this.setState({intro:false}), 30000);
    this._onKey = (e) => this.onKey(e);
    this._onAct = () => this.activity();
    window.addEventListener('keydown', this._onKey);
    window.addEventListener('mousemove', this._onAct);
    window.addEventListener('touchstart', this._onAct);
  }
  componentWillUnmount(){
    clearInterval(this._tick); clearTimeout(this._introT); clearTimeout(this._fadeT);
    window.removeEventListener('keydown', this._onKey);
    window.removeEventListener('mousemove', this._onAct);
    window.removeEventListener('touchstart', this._onAct);
  }

  tick(){
    if(this.state.playing){
      this._elapsed += 250;
      const dur = (this.props.minutesPerPiece ?? 5) * 60000;
      if(this._elapsed >= dur){ this._elapsed = 0; this.go(1); }
    }
    if(this.state.menuOpen && Date.now() - this._lastActivity > 3200){
      this.setState({menuOpen:false});
    }
  }
  activity(){
    this._lastActivity = Date.now();
    if(!this.state.menuOpen) this.setState({menuOpen:true});
  }

  go(dir){ this.goTo((this.state.i + dir + FLAT.length) % FLAT.length); }
  goTo(n){
    this._elapsed = 0;
    this.setState({ prevI: this.state.i, i: n, fade: false });
    requestAnimationFrame(() => requestAnimationFrame(() => this.setState({fade:true})));
    clearTimeout(this._fadeT);
    this._fadeT = setTimeout(() => this.setState({prevI:null}), 2000);
    if(FLAT[n].isCollectionStart) this.showIntro();
  }
  showIntro(){
    this.setState({intro:true});
    clearTimeout(this._introT);
    this._introT = setTimeout(() => this.setState({intro:false}), 30000);
  }
  goCollection(dir){
    const cur = FLAT[this.state.i].collIndex;
    const nc = (cur + dir + COLLECTIONS.length) % COLLECTIONS.length;
    this.goTo(FLAT.findIndex(p => p.collIndex === nc && p.pieceIndex === 0));
  }
  toggle(){ this._elapsed = 0; this.setState(s => ({playing:!s.playing})); }
  fullscreen(){
    const d = document;
    if(!d.fullscreenElement){ if(d.documentElement.requestFullscreen) d.documentElement.requestFullscreen(); }
    else { if(d.exitFullscreen) d.exitFullscreen(); }
  }
  onKey(e){
    if(e.key === ' '){ e.preventDefault(); this.toggle(); }
    else if(e.key === 'ArrowRight') this.go(1);
    else if(e.key === 'ArrowLeft') this.go(-1);
    else if(e.key && e.key.toLowerCase() === 'f') this.fullscreen();
    this.activity();
  }
  markFailed(url){
    if(!this.state.failed[url]) this.setState(s => ({failed: Object.assign({}, s.failed, {[url]: true})}));
  }

  placeholderFor(piece){
    return React.createElement('div', {style:{
      width:'48%', height:'70%', borderRadius:'2px',
      background:`repeating-linear-gradient(135deg, ${piece.accent2} 0 16px, ${piece.accent} 16px 32px)`,
      display:'flex', alignItems:'center', justifyContent:'center',
      boxShadow:'0 24px 90px rgba(0,0,0,.6)'
    }},
      React.createElement('div', {style:{
        fontFamily:"'IBM Plex Mono', monospace", fontSize:'12px', letterSpacing:'.12em',
        textTransform:'uppercase', color:'rgba(255,255,255,.72)', textAlign:'center',
        padding:'0 26px', lineHeight:1.8
      }}, piece.title, React.createElement('br'), '\u2014 ' + piece.source + ' image \u2014')
    );
  }
  artImage(piece){
    if(!piece.image || this.state.failed[piece.image]) return this.placeholderFor(piece);
    return React.createElement('img', {
      src: piece.image, alt: piece.title,
      onError: () => this.markFailed(piece.image),
      style:{ maxWidth:'100%', maxHeight:'100%', width:'auto', height:'auto', objectFit:'contain', boxShadow:'0 28px 100px rgba(0,0,0,.7)' }
    });
  }
  layerEl(idx, opacity, key){
    if(idx == null) return null;
    return React.createElement('div', {key, style:{
      position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center',
      padding:'10px 14px', opacity, transition:'opacity 1.9s ease', willChange:'opacity'
    }}, this.artImage(FLAT[idx]));
  }

  renderVals(){
    const cur = FLAT[this.state.i];
    const showCaption = this.props.showCaption ?? true;
    const introOn = (this.props.showCollectionIntro ?? true) && this.state.intro;
    const playIcon = this.state.playing
      ? React.createElement('svg', {width:15, height:15, viewBox:'0 0 16 16', fill:'currentColor'}, [
          React.createElement('rect', {key:1, x:3.5, y:2.5, width:3, height:11, rx:1}),
          React.createElement('rect', {key:2, x:9.5, y:2.5, width:3, height:11, rx:1})
        ])
      : React.createElement('svg', {width:15, height:15, viewBox:'0 0 16 16', fill:'currentColor'},
          React.createElement('path', {d:'M4 2.5 L13 8 L4 13.5 Z'}));

    return {
      bg: this.props.background ?? '#0a0a0a',
      artLayers: [ this.layerEl(this.state.prevI, 1, 'b'), this.layerEl(this.state.i, this.state.fade ? 1 : 0, 'f') ],
      artBottom: showCaption ? '112px' : '0px',
      showCaption,
      piece: { title: cur.title, metaLine: cur.artist + '  \u00b7  ' + cur.date + '  \u00b7  ' + cur.medium },
      qrSrc: 'https://api.qrserver.com/v1/create-qr-code/?size=170x170&margin=0&format=svg&data=' + encodeURIComponent(cur.link),
      collection: { title: cur.collTitle, era: cur.era, blurb: cur.blurb, countLabel: cur.pieceCount + ' works in this collection' },
      collectionTitle: cur.collTitle,
      counterLabel: String(this.state.i + 1).padStart(2,'0') + ' / ' + String(FLAT.length).padStart(2,'0'),
      introOpacity: introOn ? 1 : 0,
      menuY: this.state.menuOpen ? '0%' : '135%',
      playIcon,
      onPrev: () => this.go(-1),
      onNext: () => this.go(1),
      onTogglePlay: () => this.toggle(),
      onPrevColl: () => this.goCollection(-1),
      onNextColl: () => this.goCollection(1),
      onFullscreen: () => this.fullscreen()
    };
  }
}
</script>
</body>
</html>
